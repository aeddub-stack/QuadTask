<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>QuadTask</title>
<!-- PWA / home screen behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuadTask">
<meta name="theme-color" content="#6495ed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="A hierarchical task manager — break complex work into steps at any depth.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f1;--bg3:#eeedea;
  --txt:#1a1a18;--txt2:#6b6a65;--txt3:#a09f9a;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.22);
  --danger:#c0392b;--success:#1d9e75;--due-today:#e07b00;
  --accent:#6495ed;--accent-dark:#1a1a18;
  --accent-bg:rgba(100,149,237,0.08);--accent-border:rgba(100,149,237,0.35);
  --r:8px;--rl:12px;--rx:16px;
  --sidebar:260px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2a2a27;
    --txt:#f0efe8;--txt2:#9a9990;--txt3:#5f5e5a;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
    --accent:#7aabf0;--accent-dark:#f0efe8;
    --accent-bg:rgba(122,171,240,0.1);--accent-border:rgba(122,171,240,0.3);
    --due-today:#f0a030;--danger:#e05050;
  }
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--txt)}

/* layout */
#shell{height:100vh;overflow:hidden;position:relative}

/* sidebar — always overlays, never inline */
#sidebar{
  width:var(--sidebar);
  background:var(--bg2);border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform 0.25s ease;
  z-index:30;
}
.sb-header{padding:52px 16px 12px;border-bottom:0.5px solid var(--border)}
.sb-title{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.06em;text-transform:uppercase}
.sb-projects{flex:1;overflow-y:auto;padding:8px 0}
.sb-project{
  padding:10px 16px;font-size:14px;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-radius:0;transition:background 0.1s;
  -webkit-tap-highlight-color:transparent;
}
.sb-project:active{background:var(--bg3)}
.sb-project.active{color:var(--accent);font-weight:600;background:var(--accent-bg);border-left:3px solid var(--accent)}
.sb-project-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-project-del{
  font-size:16px;color:var(--txt3);opacity:0;padding:2px;
  cursor:pointer;flex-shrink:0;
}
.sb-project:hover .sb-project-del{opacity:1}
.sb-add{
  padding:12px 16px;border-top:0.5px solid var(--border);
}
.sb-add-btn{
  width:100%;padding:10px;font-size:14px;
  background:transparent;border:0.5px solid var(--border2);
  border-radius:var(--r);color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.sb-add-btn:active{background:var(--bg3)}

/* main — always full width */
#main{display:flex;flex-direction:column;overflow:hidden;height:100vh}
.header{
  background:var(--bg);padding:52px 16px 12px;
  padding-top:max(52px, calc(env(safe-area-inset-top) + 16px));
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.header-menu-btn{
  background:none;border:none;cursor:pointer;
  font-size:22px;color:var(--txt);padding:2px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.header-titles{flex:1;min-width:0}
.project-name{font-size:18px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-sub{font-size:12px;color:var(--txt3);margin-top:1px}

/* task area */
#task-area{flex:1;overflow-y:auto;padding:12px 12px 100px}
.task-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}

/* cards */
.task-card{
  background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--rl);overflow:hidden;
  transition:border-color 0.15s;
}
.task-card.overdue{border-color:var(--danger)}
.task-card.completed{opacity:0.45}
.card-header{
  padding:12px 10px 10px;cursor:pointer;
  display:flex;align-items:flex-start;gap:8px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.card-header:active{background:var(--bg2)}
.card-check{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
}
.card-check.done{background:var(--accent);border-color:var(--accent)}
.card-check i{font-size:11px;color:#fff;display:none}
.card-check.done i{display:block}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:500;color:var(--txt);line-height:1.35;word-break:break-word}
.task-card.completed .card-title{text-decoration:line-through;color:var(--txt2)}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.card-due{font-size:10px;color:var(--txt3);display:flex;align-items:center;gap:2px}
.card-due.due-today{color:var(--due-today)}
.card-due.overdue{color:var(--danger);font-weight:700}
.card-expand{font-size:14px;color:var(--accent);flex-shrink:0;transition:transform 0.2s;margin-top:2px}
.card-expand.open{transform:rotate(90deg)}

/* step list */
.step-list{border-top:0.5px solid var(--border);padding:4px 0}
.step-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.step-row:active{background:var(--bg2)}
.step-check{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;
}
.step-check.done{background:var(--success);border-color:var(--success)}
.step-check i{font-size:9px;color:#fff;display:none}
.step-check.done i{display:block}
.step-title{font-size:12px;color:var(--txt);flex:1;line-height:1.3;word-break:break-word}
.step-title.done{text-decoration:line-through;color:var(--txt2)}
.step-title.due-today{color:var(--due-today)}
.step-title.overdue{color:var(--danger);font-weight:700}
.step-more{font-size:10px;color:var(--txt3);padding:5px 10px 7px;cursor:pointer;display:flex;align-items:center;gap:4px}
.step-more:active{background:var(--bg2)}
.step-add{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px 8px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.step-add:active{background:var(--bg2)}
.step-add span{font-size:11px;color:var(--txt3)}

/* empty */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:60px 16px;color:var(--txt2);font-size:14px;line-height:1.8;
}

/* fab */
.fab{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  bottom:max(28px, calc(env(safe-area-inset-bottom) + 16px));
  background:var(--accent);color:#fff;
  border:none;border-radius:28px;padding:13px 26px;
  font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:8px;z-index:10;
  box-shadow:0 2px 12px rgba(0,0,0,0.18);
  -webkit-tap-highlight-color:transparent;transition:opacity 0.15s;
}
.fab:disabled{opacity:0.3;pointer-events:none}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:25;animation:fi 0.15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* sheet */
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);border-radius:var(--rx) var(--rx) 0 0;
  z-index:26;padding:0 0 40px;
  animation:su 0.2s ease;
}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:16px;font-weight:600;padding:16px 20px 4px;color:var(--txt)}
.sheet-sub{font-size:12px;color:var(--txt3);padding:0 20px 12px;border-bottom:0.5px solid var(--border)}
.sheet-item{
  padding:14px 20px;font-size:15px;color:var(--txt);
  cursor:pointer;display:flex;align-items:center;gap:12px;
  -webkit-tap-highlight-color:transparent;
}
.sheet-item:active{background:var(--bg2)}
.sheet-item i{font-size:20px;color:var(--txt2)}
.sheet-item.danger{color:var(--danger)}
.sheet-item.danger i{color:var(--danger)}

/* modal */
.modal-wrap{
  position:fixed;inset:0;
  display:flex;align-items:flex-end;z-index:27;
}
.modal{
  background:var(--bg);border-radius:var(--rx) var(--rx) 0 0;
  padding:0 20px 44px;width:100%;
  animation:su 0.2s ease;
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal h3{font-size:17px;font-weight:600;padding:16px 0 14px;color:var(--txt)}
.field-label{font-size:12px;color:var(--txt2);margin-bottom:6px;display:block}
.modal input[type=text],.modal input[type=date]{
  width:100%;padding:12px 14px;margin-bottom:14px;
  font-size:15px;border:0.5px solid var(--border);
  border-radius:var(--r);background:var(--bg2);
  color:var(--txt);outline:none;-webkit-appearance:none;
}
.modal input:focus{border-color:var(--border2)}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.btn-cancel{
  flex:1;padding:13px;font-size:15px;
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:var(--r);color:var(--txt2);cursor:pointer;
}
.btn-save{
  flex:2;padding:13px;font-size:15px;font-weight:500;
  background:var(--accent);border:none;
  border-radius:var(--r);color:#fff;cursor:pointer;
}


/* ── calendar ── */
#cal-wrap{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 12px 8px;flex-shrink:0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-month{font-size:14px;font-weight:600;color:var(--txt)}
.cal-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt2);padding:4px 8px;border-radius:var(--r);-webkit-tap-highlight-color:transparent}
.cal-btn:active{background:var(--bg2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;font-weight:600;color:var(--txt3);text-align:center;padding:2px 0 4px;letter-spacing:0.04em}
.cal-day{
  display:flex;flex-direction:column;align-items:center;
  padding:4px 2px;border-radius:6px;cursor:pointer;
  font-size:12px;color:var(--txt2);min-height:30px;
  -webkit-tap-highlight-color:transparent;position:relative;
  transition:background 0.1s;
}
.cal-day:active{background:var(--bg3)}
.cal-day.other-month{color:var(--txt3)}
.cal-day.has-tasks::after{
  content:'';display:block;width:4px;height:4px;
  border-radius:50%;background:var(--accent);margin-top:2px;
}
.cal-day.today .cal-num{
  background:var(--accent);color:#fff;
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;
}
.cal-day.selected:not(.today) .cal-num{
  background:var(--accent-bg);color:var(--accent);
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;border:1px solid var(--accent-border);
}
.cal-day.today.selected .cal-num{
  outline:2px solid var(--accent);outline-offset:2px;
}
.cal-num{line-height:22px;min-width:22px;text-align:center}
.cal-filter-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0 2px;font-size:12px;color:var(--accent);
}
.cal-clear{background:none;border:none;font-size:12px;color:var(--txt3);cursor:pointer;padding:2px 4px;border-radius:4px}
.cal-clear:active{background:var(--bg2)}


/* ── sidebar utility buttons ── */
.sb-util-btn{
  width:100%;padding:9px 12px;font-size:13px;
  background:transparent;border:0.5px solid var(--border);
  border-radius:var(--r);color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.1s;text-align:left;
}
.sb-util-btn:active{background:var(--bg3)}
.sb-util-btn i{font-size:16px;color:var(--txt3);flex-shrink:0}
.sb-util-btn.accent{color:var(--accent);border-color:var(--accent-border)}
.sb-util-btn.accent i{color:var(--accent)}
.sb-divider{height:0.5px;background:var(--border);margin:8px 0}
/* hidden file input */
#import-file-input{display:none}

/* sidebar always overlays — never inline */
#sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(calc(-1 * var(--sidebar)))}
#sidebar.open{transform:translateX(0)}
#sb-overlay{display:none;position:fixed;inset:0;z-index:29;background:rgba(0,0,0,0.35)}
#sb-overlay.show{display:block}
</style>
</head>
<body>
<div id="shell">
  <div id="sidebar">
    <div class="sb-header"><div class="sb-title">Projects</div></div>
    <div class="sb-projects" id="sb-projects"></div>
    <div class="sb-add">
      <button class="sb-add-btn" id="sb-add-btn"><i class="ti ti-plus"></i> New project</button>
      <div class="sb-divider"></div>
      <button class="sb-util-btn" id="export-btn"><i class="ti ti-download"></i> Export all data</button>
      <button class="sb-util-btn" id="import-btn"><i class="ti ti-upload"></i> Import data</button>
      <input type="file" id="import-file-input" accept=".json">
      <div class="sb-divider"></div>
      <button class="sb-util-btn accent" id="claude-btn"><i class="ti ti-brand-claude"></i> Copy Claude handover</button>
    </div>
  </div>
  <div id="sb-overlay"></div>
  <div id="main">
    <div class="header">
      <button class="header-menu-btn" id="menu-btn" aria-label="Open sidebar"><i class="ti ti-menu-2"></i></button>
      <div class="header-titles">
        <div class="project-name" id="project-name">Loading…</div>
        <div class="project-sub" id="project-sub"></div>
      </div>
    </div>
    <div id="cal-wrap">
      <div class="cal-nav">
        <button class="cal-btn" id="cal-prev"><i class="ti ti-chevron-left"></i></button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-btn" id="cal-next"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-filter-bar" id="cal-filter-bar" style="display:none">
        <span id="cal-filter-label"></span>
        <button class="cal-clear" id="cal-clear">Show all ✕</button>
      </div>
    </div>
    <div id="task-area"><div class="task-grid" id="task-grid"></div></div>
  </div>
</div>
<button class="fab" id="add-btn"><i class="ti ti-plus"></i> Add task</button>
<div id="overlay-root"></div>

<script>
const SK = 'quadtask_v2';

function load(){
  try{ return JSON.parse(localStorage.getItem(SK)) || null; }catch{ return null; }
}
function save(state){ localStorage.setItem(SK, JSON.stringify(state)); }

function defaultState(){
  return {
    projects:[{id:uid(),name:'Tasker',tasks:[]}],
    activeProject:null
  };
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function findNode(arr,id){
  for(const n of arr){
    if(n.id===id) return n;
    const f=findNode(n.children,id);
    if(f) return f;
  }
  return null;
}
function findParent(arr,cid){
  for(const n of arr){
    if(n.children.some(c=>c.id===cid)) return n;
    const f=findParent(n.children,cid);
    if(f) return f;
  }
  return null;
}
function propagateUp(tasks,id){
  // walk up: auto-complete a parent only if ALL its children are now done
  // never force a parent back open (user may have manually completed it)
  const p=findParent(tasks,id);
  if(!p) return;
  if(p.children.every(c=>c.completed)){
    p.completed=true; p.completedAt=Date.now();
  }
  propagateUp(tasks,p.id);
}
function reopenUp(tasks,id){
  // unchecking a step reopens its ancestors so the tree is consistent
  const p=findParent(tasks,id);
  if(!p) return;
  p.completed=false; p.completedAt=null;
  reopenUp(tasks,p.id);
}
function toggleComplete(tasks,id){
  const node=findNode(tasks,id);
  if(!node) return;
  node.completed=!node.completed;
  node.completedAt=node.completed?Date.now():null;
  if(node.completed){
    // auto-complete ancestors if all siblings are also done
    propagateUp(tasks,id);
  } else {
    // reopen ancestors so nothing appears complete with incomplete children
    reopenUp(tasks,id);
  }
}
function countDone(node){
  if(!node.children.length) return null;
  return {done:node.children.filter(c=>c.completed).length, total:node.children.length};
}
function formatDate(s){
  if(!s) return '';
  return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function dateStatus(s, completed){
  // returns 'overdue', 'due-today', or '' — only for incomplete items
  if(!s || completed) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(s+'T00:00:00');
  if(d < today) return 'overdue';
  if(d.getTime()===today.getTime()) return 'due-today';
  return '';
}

// ── state ──
let S = load() || defaultState();
if(!S.activeProject) S.activeProject = S.projects[0]?.id || null;

// track which cards are expanded
// top-level tasks default to open; stores explicit user overrides
let expanded = {};
let collapsedByUser = {};  // tracks cards explicitly closed by user

function activeProject(){
  return S.projects.find(p=>p.id===S.activeProject) || S.projects[0];
}
function activeTasks(){
  return activeProject()?.tasks || [];
}

// ── sidebar ──
function renderSidebar(){
  const proj = activeProject();
  const el = document.getElementById('sb-projects');
  el.innerHTML = S.projects.map(p=>`
    <div class="sb-project${p.id===S.activeProject?' active':''}" data-pid="${p.id}">
      <span class="sb-project-name">${p.name}</span>
      ${S.projects.length>1?`<i class="ti ti-x sb-project-del" data-del="${p.id}" title="Delete project"></i>`:''}
    </div>`).join('');
  el.querySelectorAll('.sb-project').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-del]')) return;
      S.activeProject=el.dataset.pid;
      expanded={}; collapsedByUser={};
      save(S); closeSidebar(); render();
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const pid=btn.dataset.del;
      if(!confirm('Delete this project and all its tasks?')) return;
      S.projects=S.projects.filter(p=>p.id!==pid);
      if(S.activeProject===pid) S.activeProject=S.projects[0]?.id||null;
      save(S); renderSidebar(); render();
    });
  });
  document.getElementById('project-name').textContent=proj?.name||'';
  const tasks=activeTasks();
  const done=countAllDone(tasks);
  document.getElementById('project-sub').textContent=tasks.length?`${done}/${tasks.length} top-level tasks done`:'';
}
function countAllDone(tasks){ return tasks.filter(t=>t.completed).length; }

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-overlay').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}
document.getElementById('menu-btn').addEventListener('click',openSidebar);
document.getElementById('sb-overlay').addEventListener('click',closeSidebar);

document.getElementById('sb-add-btn').addEventListener('click',()=>{
  if(S.projects.length>=10){ alert('Maximum 10 projects reached.'); return; }
  showNameModal('New project','Project name','Create',name=>{
    const p={id:uid(),name,tasks:[]};
    S.projects.push(p);
    S.activeProject=p.id;
    expanded={}; collapsedByUser={};
    save(S); closeSidebar(); renderSidebar(); render();
  });
});

// ── main grid ──
function taskMatchesDate(t, dateStr){
  // a task matches if it or any descendant has this due date (and is incomplete)
  if(t.dueDate===dateStr && !t.completed) return true;
  return t.children.some(c=>taskMatchesDate(c,dateStr));
}
function renderGrid(){
  const allTasks=activeTasks();
  const sel=calState?calState.selected:null;
  const tasks=sel ? allTasks.filter(t=>taskMatchesDate(t,sel)) : allTasks;
  const grid=document.getElementById('task-grid');
  document.getElementById('add-btn').disabled=allTasks.length>=4;
  if(!tasks.length){
    grid.innerHTML=sel
      ? '<div class="empty-state">No tasks due on this date.</div>'
      : '<div class="empty-state">No tasks yet.<br>Tap <strong>Add task</strong> to begin.</div>';
    return;
  }
  // auto-expand top-level tasks that have steps, unless user collapsed them
  tasks.forEach(t=>{
    if(t.children.length && !collapsedByUser[t.id]) expanded[t.id]=true;
  });
  grid.innerHTML=tasks.map(t=>renderCard(t,0)).join('');
  attachCardEvents(grid, allTasks);
}

// renders a step row recursively — depth controls indentation
function renderStepRow(c, depth){
  const isOpen=!!expanded[c.id];
  const canAddSub=c.children.length<4&&!c.completed;
  const indent=depth*14;
  const chevron=c.children.length
    ?`<i class="ti ti-chevron-right" style="font-size:12px;color:var(--txt3);flex-shrink:0;transition:transform 0.2s;${isOpen?'transform:rotate(90deg)':''}"></i>`
    :'<span style="width:12px;flex-shrink:0"></span>';
  let inner=`<div class="step-row" data-step="${c.id}" style="padding-left:${10+indent}px">
    <div class="step-check${c.completed?' done':''}" data-stepcheck="${c.id}"><i class="ti ti-check"></i></div>
    <span class="step-title${c.completed?' done':''}">${c.title}</span>
    ${chevron}
  </div>`;
  if(isOpen){
    if(c.children.length){
      inner+=c.children.map(gc=>renderStepRow(gc, depth+1)).join('');
    }
    if(canAddSub){
      inner+=`<div class="step-add" data-stepadd="${c.id}" style="padding-left:${10+indent+14}px">
        <i class="ti ti-plus" style="font-size:13px;color:var(--txt3)"></i><span>Add step</span>
      </div>`;
    }
  }
  return inner;
}

function renderCard(t, depth){
  const ds=dateStatus(t.dueDate, t.completed);
  const prog=countDone(t);
  const isOpen=!!expanded[t.id];
  const dateHtml=t.dueDate?`<span class="card-due${ds?' '+ds:''}"><i class="ti ti-calendar" style="font-size:10px"></i>${formatDate(t.dueDate)}</span>`:'';
  const progHtml=prog?`<span style="font-size:10px;color:var(--txt3)">${prog.done}/${prog.total}</span>`:'';
  const canAddSub=t.children.length<4&&!t.completed;

  let stepsHtml='';
  if(isOpen){
    const rows=t.children.map(c=>renderStepRow(c,0)).join('');
    const addRow=canAddSub?`<div class="step-add" data-stepadd="${t.id}" style="padding-left:10px">
      <i class="ti ti-plus" style="font-size:13px;color:var(--txt3)"></i><span>Add step</span>
    </div>`:'';
    stepsHtml=`<div class="step-list">${rows}${addRow}</div>`;
  }

  return `<div class="task-card${t.completed?' completed':''}${ds==='overdue'?' overdue':''}" data-id="${t.id}">
    <div class="card-header" data-toggle="${t.id}">
      <div class="card-check${t.completed?' done':''}" data-topcheck="${t.id}"><i class="ti ti-check"></i></div>
      <div class="card-body">
        <div class="card-title">${t.title}</div>
        <div class="card-meta">${dateHtml}${progHtml}</div>
      </div>
      <i class="ti ti-chevron-right card-expand${isOpen?' open':''}" aria-hidden="true"></i>
    </div>
    ${stepsHtml}
  </div>`;
}

function attachCardEvents(grid, tasks){
  // top-level card toggle expand
  grid.querySelectorAll('[data-toggle]').forEach(el=>{
    let timer;
    el.addEventListener('click', e=>{
      if(e.target.closest('[data-topcheck]')) return;
      const id=el.dataset.toggle;
      expanded[id]=!expanded[id];
      collapsedByUser[id]=!expanded[id];
      renderGrid();
    });
    el.addEventListener('touchstart',()=>{ timer=setTimeout(()=>showCtx(el.dataset.toggle,tasks),600); },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(timer));
    el.addEventListener('touchmove',()=>clearTimeout(timer));
    el.addEventListener('contextmenu',e=>{ e.preventDefault(); showCtx(el.dataset.toggle,tasks); });
  });
  // top-level check
  grid.querySelectorAll('[data-topcheck]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      toggleComplete(tasks, el.dataset.topcheck);
      save(S); render();
    });
  });
  // step check — works at any depth
  grid.querySelectorAll('[data-stepcheck]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      toggleComplete(tasks, el.dataset.stepcheck);
      save(S); render();
    });
  });
  // step row click — expand/collapse if has children, long-press for ctx
  grid.querySelectorAll('.step-row').forEach(el=>{
    const stepId=el.dataset.step;
    const node=findNode(tasks,stepId);
    let timer;
    el.addEventListener('touchstart',()=>{ timer=setTimeout(()=>showCtx(stepId,tasks),600); },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(timer));
    el.addEventListener('touchmove',()=>clearTimeout(timer));
    el.addEventListener('contextmenu',e=>{ e.preventDefault(); showCtx(stepId,tasks); });
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-stepcheck]')) return;
      expanded[stepId]=!expanded[stepId];
      renderGrid();
    });
  });
  // add step at any level
  grid.querySelectorAll('[data-stepadd]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const parentId=el.dataset.stepadd;
      expanded[parentId]=true;
      showAddModal(parentId);
    });
  });
}

// ── context menu ──
function showCtx(taskId, tasks){
  const node=findNode(tasks,taskId);
  if(!node) return;
  const isRoot=tasks.some(t=>t.id===taskId);
  const canAdd=node.children.length<4&&!node.completed;
  closeOverlays();
  const root=document.getElementById('overlay-root');
  root.innerHTML=`
    <div class="overlay" id="ctx-overlay"></div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">${node.title}</div>
      <div class="sheet-sub">${node.children.length} step${node.children.length!==1?'s':''}</div>
      ${canAdd?`<div class="sheet-item" id="ctx-add"><i class="ti ti-plus"></i>Add step</div>`:''}
      <div class="sheet-item" id="ctx-edit"><i class="ti ti-edit"></i>Edit</div>
      ${isRoot?`<div class="sheet-item" id="ctx-move"><i class="ti ti-arrows-move"></i>Move to project</div>`:''}
      <div class="sheet-item danger" id="ctx-del"><i class="ti ti-trash"></i>Delete</div>
      <div class="sheet-item" id="ctx-cancel"><i class="ti ti-x"></i>Cancel</div>
    </div>`;
  root.querySelector('#ctx-overlay').addEventListener('click',closeOverlays);
  root.querySelector('#ctx-cancel').addEventListener('click',closeOverlays);
  root.querySelector('#ctx-del')?.addEventListener('click',()=>{ closeOverlays(); deleteTask(taskId); });
  root.querySelector('#ctx-edit')?.addEventListener('click',()=>{ closeOverlays(); showEditModal(taskId); });
  root.querySelector('#ctx-add')?.addEventListener('click',()=>{
    closeOverlays();
    expanded[taskId]=true;
    showAddModal(taskId);
  });
  root.querySelector('#ctx-move')?.addEventListener('click',()=>{ closeOverlays(); showMoveModal(taskId); });
}

function deleteTask(id){
  function rm(arr){ const i=arr.findIndex(t=>t.id===id); if(i!==-1){arr.splice(i,1);return true;} return arr.some(t=>rm(t.children)); }
  rm(activeTasks()); save(S); renderSidebar(); renderGrid();
}

// ── modals ──
function closeOverlays(){ document.getElementById('overlay-root').innerHTML=''; }

function showAddModal(parentId){
  closeOverlays();
  const root=document.getElementById('overlay-root');
  root.innerHTML=`
    <div class="overlay" id="m-overlay"></div>
    <div class="modal-wrap">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3>New task</h3>
        <label class="field-label">Name</label>
        <input type="text" id="m-title" placeholder="What needs doing?" maxlength="80"/>
        <label class="field-label">Due date (optional)</label>
        <input type="date" id="m-date"/>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-cancel">Cancel</button>
          <button class="btn-save" id="m-save">Add</button>
        </div>
      </div>
    </div>`;
  const ti=root.querySelector('#m-title');
  setTimeout(()=>ti.focus(),60);
  root.querySelector('#m-overlay').addEventListener('click',closeOverlays);
  root.querySelector('#m-cancel').addEventListener('click',closeOverlays);
  root.querySelector('#m-save').addEventListener('click',()=>{
    const title=ti.value.trim();
    if(!title){ti.style.borderColor='var(--danger)';ti.focus();return;}
    const dueDate=root.querySelector('#m-date').value||null;
    const newTask={id:uid(),title,dueDate,completed:false,completedAt:null,children:[],createdAt:Date.now()};
    if(parentId){
      const p=findNode(activeTasks(),parentId);
      if(p) p.children.push(newTask);
    } else {
      activeTasks().push(newTask);
    }
    save(S); closeOverlays(); renderSidebar(); renderGrid();
  });
  ti.addEventListener('keydown',e=>{ if(e.key==='Enter') root.querySelector('#m-save').click(); });
}

function showEditModal(id){
  const node=findNode(activeTasks(),id);
  if(!node) return;
  closeOverlays();
  const root=document.getElementById('overlay-root');
  root.innerHTML=`
    <div class="overlay" id="m-overlay"></div>
    <div class="modal-wrap">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3>Edit task</h3>
        <label class="field-label">Name</label>
        <input type="text" id="m-title" value="${node.title}" maxlength="80"/>
        <label class="field-label">Due date (optional)</label>
        <input type="date" id="m-date" value="${node.dueDate||''}"/>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-cancel">Cancel</button>
          <button class="btn-save" id="m-save">Save</button>
        </div>
      </div>
    </div>`;
  const ti=root.querySelector('#m-title');
  setTimeout(()=>{ti.focus();ti.select();},60);
  root.querySelector('#m-overlay').addEventListener('click',closeOverlays);
  root.querySelector('#m-cancel').addEventListener('click',closeOverlays);
  root.querySelector('#m-save').addEventListener('click',()=>{
    const title=ti.value.trim();
    if(!title){ti.style.borderColor='var(--danger)';ti.focus();return;}
    node.title=title;
    node.dueDate=root.querySelector('#m-date').value||null;
    save(S); closeOverlays(); renderSidebar(); renderGrid();
  });
}

function showMoveModal(taskId){
  const others=S.projects.filter(p=>p.id!==S.activeProject);
  if(!others.length){ alert('No other projects to move to.'); return; }
  closeOverlays();
  const root=document.getElementById('overlay-root');
  root.innerHTML=`
    <div class="overlay" id="m-overlay"></div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Move to project</div>
      <div class="sheet-sub">Choose destination</div>
      ${others.map(p=>`<div class="sheet-item" data-dest="${p.id}"><i class="ti ti-folder"></i>${p.name}</div>`).join('')}
      <div class="sheet-item" id="ctx-cancel"><i class="ti ti-x"></i>Cancel</div>
    </div>`;
  root.querySelector('#m-overlay').addEventListener('click',closeOverlays);
  root.querySelector('#ctx-cancel').addEventListener('click',closeOverlays);
  root.querySelectorAll('[data-dest]').forEach(el=>{
    el.addEventListener('click',()=>{
      const tasks=activeTasks();
      const idx=tasks.findIndex(t=>t.id===taskId);
      if(idx===-1) return;
      const [task]=tasks.splice(idx,1);
      const dest=S.projects.find(p=>p.id===el.dataset.dest);
      if(dest&&dest.tasks.length<4) dest.tasks.push(task);
      else alert('Destination project already has 4 top-level tasks.');
      save(S); closeOverlays(); renderSidebar(); renderGrid();
    });
  });
}

function showNameModal(heading, placeholder, confirmLabel, cb){
  closeOverlays();
  const root=document.getElementById('overlay-root');
  root.innerHTML=`
    <div class="overlay" id="m-overlay"></div>
    <div class="modal-wrap">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3>${heading}</h3>
        <input type="text" id="m-title" placeholder="${placeholder}" maxlength="40"/>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-cancel">Cancel</button>
          <button class="btn-save" id="m-save">${confirmLabel}</button>
        </div>
      </div>
    </div>`;
  const ti=root.querySelector('#m-title');
  setTimeout(()=>ti.focus(),60);
  root.querySelector('#m-overlay').addEventListener('click',closeOverlays);
  root.querySelector('#m-cancel').addEventListener('click',closeOverlays);
  root.querySelector('#m-save').addEventListener('click',()=>{
    const v=ti.value.trim();
    if(!v){ti.style.borderColor='var(--danger)';ti.focus();return;}
    closeOverlays(); cb(v);
  });
  ti.addEventListener('keydown',e=>{ if(e.key==='Enter') root.querySelector('#m-save').click(); });
}

document.getElementById('add-btn').addEventListener('click',()=>showAddModal(null));


// ── calendar ──────────────────────────────────────────────────────────────
const calState = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),  // 0-based
  selected: null  // 'YYYY-MM-DD' or null
};

function allDueDates(tasks){
  // collect all due dates from tasks and their descendants (incomplete only)
  const dates = new Set();
  function walk(arr){
    for(const t of arr){
      if(t.dueDate && !t.completed) dates.add(t.dueDate);
      walk(t.children);
    }
  }
  walk(tasks);
  return dates;
}

function renderCalendar(){
  const {year, month, selected} = calState;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const dueDates = allDueDates(activeTasks());

  // month label
  document.getElementById('cal-month-label').textContent =
    new Date(year, month, 1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  // build grid — start on Monday
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  // dow: Mon=0 … Sun=6
  const startDow = (firstDay.getDay()+6)%7;

  const dows = ['M','T','W','T','F','S','S'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // leading blanks from previous month
  for(let i=0;i<startDow;i++){
    const d = new Date(year, month, -startDow+i+1);
    const ds = toDateStr(d);
    html += calDayHtml(d.getDate(), ds, true, ds===todayStr, ds===selected, dueDates.has(ds));
  }
  // this month
  for(let d=1;d<=lastDay.getDate();d++){
    const ds = toDateStr(new Date(year,month,d));
    html += calDayHtml(d, ds, false, ds===todayStr, ds===selected, dueDates.has(ds));
  }
  // trailing blanks
  const total = startDow + lastDay.getDate();
  const trailing = total%7===0 ? 0 : 7-(total%7);
  for(let i=1;i<=trailing;i++){
    const d = new Date(year, month+1, i);
    const ds = toDateStr(d);
    html += calDayHtml(d.getDate(), ds, true, ds===todayStr, ds===selected, dueDates.has(ds));
  }

  document.getElementById('cal-grid').innerHTML = html;

  // filter bar
  const bar = document.getElementById('cal-filter-bar');
  if(selected){
    bar.style.display='flex';
    const d = new Date(selected+'T00:00:00');
    document.getElementById('cal-filter-label').textContent =
      'Showing: ' + d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  } else {
    bar.style.display='none';
  }

  // attach day click events
  document.getElementById('cal-grid').querySelectorAll('.cal-day[data-date]').forEach(el=>{
    el.addEventListener('click',()=>{
      const ds = el.dataset.date;
      calState.selected = calState.selected===ds ? null : ds;
      renderCalendar();
      renderGrid();
    });
  });
}

function calDayHtml(num, ds, otherMonth, isToday, isSelected, hasTasks){
  const cls = [
    'cal-day',
    otherMonth?'other-month':'',
    isToday?'today':'',
    isSelected?'selected':'',
    hasTasks?'has-tasks':''
  ].filter(Boolean).join(' ');
  return `<div class="${cls}" data-date="${ds}"><span class="cal-num">${num}</span></div>`;
}

function toDateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

document.getElementById('cal-prev').addEventListener('click',()=>{
  calState.month--;
  if(calState.month<0){calState.month=11;calState.year--;}
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click',()=>{
  calState.month++;
  if(calState.month>11){calState.month=0;calState.year++;}
  renderCalendar();
});
document.getElementById('cal-clear').addEventListener('click',()=>{
  calState.selected=null;
  renderCalendar();
  renderGrid();
});

// ── export / import / claude handover ─────────────────────────────────────

function exportData(){
  const json = JSON.stringify(S, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `quadtask-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      // basic validation
      if(!parsed.projects || !Array.isArray(parsed.projects))
        throw new Error('Invalid file structure');
      if(!confirm(`This will replace all current data with ${parsed.projects.length} project(s) from the file. Continue?`))
        return;
      S = parsed;
      if(!S.activeProject) S.activeProject = S.projects[0]?.id || null;
      expanded = {}; collapsedByUser = {};
      save(S);
      closeSidebar();
      render();
    } catch(err){
      alert('Could not import file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// build a readable task tree for the Claude handover prompt
function taskTreeText(tasks, indent){
  let out = '';
  for(const t of tasks){
    const status = t.completed ? '\u2713' : '\u25cb';
    const due    = t.dueDate ? ' [due: ' + t.dueDate + ']' : '';
    const steps  = t.children.length ? ' (' + t.children.filter(c=>c.completed).length + '/' + t.children.length + ' steps done)' : '';
    out += indent + status + ' ' + t.title + due + steps + '\n';
    if(t.children.length) out += taskTreeText(t.children, indent + '    ');
  }
  return out;
}

function buildClaudeHandover(){
  const today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let text = '# QuadTask Handover \u2014 ' + today + '\n\n';
  text += 'This is a handover snapshot from QuadTask, a personal hierarchical task manager.\n';
  text += 'Tasks marked \u2713 are complete. Tasks marked \u25cb are open.\n';
  text += 'Indentation shows the step hierarchy. Due dates are in YYYY-MM-DD format.\n\n';
  text += '---\n\n';
  for(const proj of S.projects){
    const done  = proj.tasks.filter(t=>t.completed).length;
    const total = proj.tasks.length;
    text += '## Project: ' + proj.name + '  (' + done + '/' + total + ' top-level tasks complete)\n\n';
    if(!proj.tasks.length){
      text += '  (no tasks)\n\n';
    } else {
      text += taskTreeText(proj.tasks, '');
      text += '\n';
    }
  }
  text += '---\n\n';
  text += '## Raw JSON (for re-import)\n\n';
  text += '```json\n';
  text += JSON.stringify(S, null, 2);
  text += '\n```\n';
  return text;
}

document.getElementById('export-btn').addEventListener('click', exportData);

document.getElementById('import-btn').addEventListener('click', ()=>{
  document.getElementById('import-file-input').click();
});
document.getElementById('import-file-input').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(file) importData(file);
  e.target.value = ''; // reset so same file can be re-imported
});

document.getElementById('claude-btn').addEventListener('click', ()=>{
  const text = buildClaudeHandover();
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('claude-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    setTimeout(()=>{ btn.innerHTML = orig; }, 2000);
  }).catch(()=>{
    // fallback for browsers that block clipboard without HTTPS
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('claude-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    setTimeout(()=>{ btn.innerHTML = orig; }, 2000);
  });
});

function render(){ renderSidebar(); renderCalendar(); renderGrid(); }
render();
